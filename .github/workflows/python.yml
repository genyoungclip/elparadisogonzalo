name: Build

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5

      with:

        python-version: "3.12"

    - uses: actions/setup-node@v4

      with:

        node-version: "22"

    - run: python -m pip install build twine

    - run: python scripts/build_frontend.py

    - run: python -m build

    - run: twine check dist/*
