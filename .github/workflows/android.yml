name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vite frontend
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor Android
        working-directory: frontend
        run: |
          npm install --save-dev @capacitor/cli
          npx cap sync android

      - name: Create keystore.properties
        working-directory: frontend/android
        run: |
          cat > keystore.properties <<EOF
          storeFile=app/release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Decode release keystore
        working-directory: frontend/android
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Verify keystore
        working-directory: frontend/android
        run: |
          ls -lh app/release.keystore
          keytool -list \
            -keystore app/release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Build signed APK and AAB
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease bundleRelease

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: elparadisogonzalo-release-apk
          path: frontend/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: elparadisogonzalo-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
