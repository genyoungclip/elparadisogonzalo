name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

jobs:
  docker:
    runs-on: elparadisogonzalo

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/genyoungclip/elparadisogonzalo:latest
